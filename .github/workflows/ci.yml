name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, Typecheck & Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        node_version: ['lts/*']
        include:
          - os: macos-latest
            node_version: 'lts/*'
          - os: windows-latest
            node_version: 'lts/*'
      fail-fast: false
    env:
      CI: true
    steps:
      - name: Set git to use LF
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@10.33.4 --activate

      - name: Set node ${{ matrix.node_version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node_version }}
          cache: pnpm

      - name: Setup
        run: npm i -g @antfu/ni

      - name: Install
        run: nci

      - name: Lint (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: pnpm lint

      - name: Typecheck
        run: nr typecheck

      - name: Run tests
        run: pnpm run build:parser && pnpm run build:core && nr test -- --run

      - name: Run SSR check
        run: nr check:ssr

      - name: Build (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: pnpm run build:parser && pnpm build

      - name: Minimal install smoke (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: MARKSTREAM_SMOKE_SKIP_BUILD=1 pnpm test:smoke:minimal

      - name: Packed smoke with optional peers (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: MARKSTREAM_SMOKE_SKIP_BUILD=1 pnpm test:smoke:pack:optional

      - name: Check package size budget (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: pnpm size:check
